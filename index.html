<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📦 Gestor de Produtos - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      padding: 32px 20px;
      color: #1e293b;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header Profissional */
    header {
      text-align: center;
      margin-bottom: 48px;
      padding: 50px 20px 40px;
    }

    header h1 {
      font-size: 3.2em;
      margin-bottom: 12px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1.5px;
      text-transform: capitalize;
    }

    header p {
      font-size: 1em;
      color: #cbd5e1;
      font-weight: 300;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* Seção do Formulário */
    .form-section {
      background: white;
      border-radius: 24px;
      padding: 48px;
      margin-bottom: 40px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.12);
      border: 1px solid rgba(0,0,0,0.05);
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-section h2 {
      color: #1e293b;
      margin-bottom: 32px;
      font-size: 1.7em;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.5px;
    }

    .form-group {
      display: grid;
      grid-template-columns: 1.8fr 1fr 1fr auto;
      gap: 16px;
      margin-bottom: 20px;
    }

    .form-group input {
      padding: 14px 20px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95em;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: #f8fafc;
      font-weight: 500;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      background: white;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .form-group input::placeholder {
      color: #94a3b8;
      font-weight: 500;
    }

    .form-group button {
      padding: 14px 32px;
      background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .form-group button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(59, 130, 246, 0.4);
    }

    .form-group button:active {
      transform: translateY(-1px);
    }

    .form-gr  oup button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Seção de Produtos */
    .produtos-section {
      background: white;
      border-radius: 24px;
      padding: 48px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.12);
      border: 1px solid rgba(0,0,0,0.05);
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }

    .produtos-section h2 {
      color: #1e293b;
      margin-bottom: 32px;
      font-size: 1.7em;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
      letter-spacing: -0.5px;
    }

    .lista-produtos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
      list-style: none;
    }

    .produto-card {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .produto-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #3b82f6, #1e40af);
    }

    .produto-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px rgba(59, 130, 246, 0.15);
      border-color: #3b82f6;
    }

    .produto-info {
      margin-bottom: 24px;
      flex-grow: 1;
    }

    .produto-nome {
      font-size: 1.25em;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 16px;
      word-break: break-word;
      letter-spacing: -0.5px;
    }

    .produto-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .detail-item {
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      color: #0c4a6e;
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #bae6fd;
    }

    .detail-item:nth-child(odd) {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      color: #334155;
      border-color: #cbd5e1;
    }

    .precos-diferentes {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border: 2px solid #fbbf24;
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
      font-size: 0.85em;
      color: #92400e;
    }

    .precos-diferentes-label {
      font-weight: 700;
      margin-bottom: 8px;
      display: block;
    }

    .precos-diferentes-item {
      background: rgba(255, 255, 255, 0.5);
      padding: 6px 10px;
      border-radius: 6px;
      margin: 4px 0;
      font-size: 0.9em;
    }

    .detail-label {
      font-size: 0.8em;
      opacity: 0.8;
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-size: 1.5em;
      font-weight: 800;
    }

    .produto-total {
      padding: 16px;
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid #93c5fd;
      text-align: center;
    }

    .produto-total-label {
      font-size: 0.8em;
      color: #0c4a6e;
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .produto-total-value {
      font-size: 1.8em;
      font-weight: 800;
      color: #0c4a6e;
    }

    .produto-data {
      font-size: 0.75em;
      color: #94a3b8;
      margin-top: 12px;
      font-weight: 500;
    }

    .btn-remover {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.95em;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    .btn-remover:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
    }

    .btn-remover:active {
      transform: translateY(0);
    }

    .btn-baixa {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.95em;
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
    }

    .btn-baixa:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
    }

    .btn-baixa:active {
      transform: translateY(0);
    }

    .baixo-estoque {
      background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%) !important;
      border-color: #fca5a5 !important;
      animation: subtlePulse 2s infinite;
    }

    @keyframes subtlePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.9; }
    }

    .vazio {
      text-align: center;
      color: #94a3b8;
      padding: 80px 20px;
      font-size: 1.15em;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .nenhum-resultado {
      text-align: center;
      color: #94a3b8;
      padding: 80px 20px;
      font-size: 1.15em;
      font-weight: 500;
      letter-spacing: 0.3px;
      grid-column: 1 / -1;
    }

    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 16px 24px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 12px 35px rgba(0,0,0,0.3);
      z-index: 1000;
      max-width: 320px;
      font-size: 0.95em;
    }

    .toast.success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }

    .toast.error {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(120px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Search e Total Section */
    #pesquisa {
      padding: 12px 18px !important;
      border: 2px solid #e2e8f0 !important;
      border-radius: 12px !important;
      font-size: 0.95em !important;
      width: 280px !important;
      max-width: 100% !important;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
      background: #f8fafc !important;
    }

    #pesquisa:focus {
      border-color: #3b82f6 !important;
      background: white !important;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1) !important;
    }

    #totalSection {
      margin-top: 40px;
      padding: 24px;
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      border-radius: 16px;
      color: #0c4a6e;
      text-align: right;
      display: none;
      border: 2px solid #93c5fd;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.15);
    }

    #totalSection > div {
      font-size: 1.6em;
      font-weight: 800;
      letter-spacing: -1px;
    }

    /* Responsividade */
    @media (max-width: 1024px) {
      .lista-produtos {
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      }
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2.2em;
      }

      .form-group {
        grid-template-columns: 1fr;
      }

      .form-section, .produtos-section {
        padding: 32px 24px;
      }

      .lista-produtos {
        grid-template-columns: 1fr;
      }

      .produto-details {
        grid-template-columns: 1fr;
      }

      .toast {
        bottom: 20px;
        right: 20px;
        left: 20px;
        max-width: none;
      }

      #pesquisa {
        width: 100% !important;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 24px 16px;
      }

      header h1 {
        font-size: 1.8em;
      }

      .form-section h2, .produtos-section h2 {
        font-size: 1.4em;
      }

      .form-section, .produtos-section {
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Gestor de Produtos</h1>
    <p>Gerencie seu inventário com inteligência</p>
  </header>

  <div class="form-section">
    <h2>➕ Adicionar Novo Produto</h2>
    <div class="form-group">
      <input id="nome" placeholder="Nome do produto" type="text" autocomplete="off">
      <input id="preco" placeholder="€ Preço" type="number" step="0.01" min="0" autocomplete="off">
      <input id="quantidade" placeholder="Qtd" type="number" min="0" autocomplete="off">
      <button id="btnAdicionar" onclick="adicionar(event)">Adicionar</button>
    </div>
  </div>

  <div class="produtos-section">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 20px;">
      <h2 style="margin: 0;">📋 Inventário <span id="contador" style="background: linear-gradient(135deg, #3b82f6, #1e40af); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75em; margin-left: 12px; font-weight: 800;">0</span></h2>
      <input id="pesquisa" placeholder="🔍 Pesquisar produto..." type="text" autocomplete="off" onkeyup="filtrarProdutos()">
    </div>
    <ul id="lista" class="lista-produtos"></ul>
    <div id="totalSection" style="display: none;">
      <div>Total: €<span id="totalValor">0.00</span></div>
    </div>
  </div>
</div>

<script>
// ===== APLICAÇÃO OFFLINE COM LOCALSTORAGE =====
const STORAGE_KEY = 'produtos_gestor';
let produtos = [];

// Carregar produtos do localStorage ao iniciar
function carregarDoStorage() {
  const dados = localStorage.getItem(STORAGE_KEY);
  if (dados) {
    try {
      produtos = JSON.parse(dados);
      console.log(`✅ ${produtos.length} produtos carregados do armazenamento local`);
    } catch (e) {
      console.error('Erro ao carregar dados:', e);
      produtos = [];
    }
  } else {
    produtos = [];
    console.log('📦 Nenhum produto armazenado ainda');
  }
}

// Salvar produtos no localStorage
function salvarNoStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(produtos));
    console.log(`💾 ${produtos.length} produto(s) salvo(s) com sucesso`);
  } catch (e) {
    console.error('Erro ao salvar dados:', e);
    mostrarErro('Erro', 'Não foi possível salvar os dados');
  }
}

// Mostrar toast de notificação
function mostrarToast(mensagem, tipo = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast ${tipo}`;
  toast.textContent = mensagem;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.animation = 'slideOut 0.4s ease-out forwards';
    setTimeout(() => toast.remove(), 400);
  }, 3000);
}

function mostrarErro(titulo, mensagem) {
  console.error(titulo, mensagem);
  mostrarToast(`${titulo}: ${mensagem}`, 'error');
}

function mostrarSucesso(mensagem) {
  console.log(`✅ ${mensagem}`);
  mostrarToast(mensagem, 'success');
}

// Adicionar produto
function adicionar(event) {
  if (event) {
    event.preventDefault();
  }

  const nome = document.getElementById("nome").value.trim();
  const preco = document.getElementById("preco").value.trim();
  const quantidade = document.getElementById("quantidade").value.trim();
  const btnAdicionar = document.getElementById("btnAdicionar");

  if (!nome || !preco || !quantidade) {
    mostrarErro("Validação", "Preencha todos os campos!");
    return;
  }

  const numPreco = parseFloat(preco);
  const numQtde = parseInt(quantidade);

  if (isNaN(numPreco) || numPreco < 0 || isNaN(numQtde) || numQtde < 0) {
    mostrarErro("Validação", "Preço e quantidade devem ser números positivos!");
    return;
  }

  document.getElementById("nome").value = "";
  document.getElementById("preco").value = "";
  document.getElementById("quantidade").value = "";
  document.getElementById("nome").focus();

  btnAdicionar.disabled = true;
  btnAdicionar.innerHTML = '<span class="loading"></span>';

  const novoProduto = {
    id: gerarID(),
    nome: nome,
    preco: numPreco,
    quantidade: numQtde,
    dataCriacao: new Date().toLocaleString('pt-PT')
  };
  produtos.push(novoProduto);
  salvarNoStorage();
  mostrarSucesso("✅ Produto adicionado com sucesso!");
  
  const lista = document.getElementById("lista");
  if (lista.innerHTML.includes('vazio')) {
    requestAnimationFrame(() => renderizarProdutos());
  } else {
    requestAnimationFrame(() => {
      lista.appendChild(renderizarProdutoCard(novoProduto, produtos.length - 1));
    });
  }

  requestAnimationFrame(() => {
    atualizarDadosGlobais();
    btnAdicionar.disabled = false;
    btnAdicionar.textContent = "Adicionar";
  });
}

// Remover produto
function remover(id) {
  const produto = produtos.find(p => p.id === id);
  if (!produto) {
    mostrarErro('Erro', 'Produto não encontrado');
    return;
  }

  if (!confirm(`Tem a certeza que deseja remover "${produto.nome}"?`)) {
    return;
  }

  produtos = produtos.filter(p => p.id !== id);
  salvarNoStorage();
  mostrarSucesso("✅ Produto removido!");
  renderizarProdutos();
}

// Dar baixa na quantidade
function darBaixa(id) {
  const produto = produtos.find(p => p.id === id);
  if (!produto) {
    mostrarErro('Erro', 'Produto não encontrado');
    return;
  }

  if (produto.quantidade <= 0) {
    mostrarErro('Aviso', 'Este produto já está sem quantidade!');
    return;
  }

  // Abrir prompt para quantidade customizada
  const quantidade = prompt(
    `Quantidade a retirar de "${produto.nome}"\n\nQuantidade disponível: ${produto.quantidade} un\n\nDigite a quantidade:`,
    '1'
  );
  
  if (quantidade === null) return; // Cancelou
  
  const qtdRetirada = parseInt(quantidade);
  
  if (isNaN(qtdRetirada) || qtdRetirada <= 0) {
    mostrarErro('Erro', 'Digite um número válido!');
    return;
  }

  if (qtdRetirada > produto.quantidade) {
    mostrarErro('Aviso', `Você não pode retirar mais de ${produto.quantidade} un!`);
    return;
  }

  produto.quantidade -= qtdRetirada;
  salvarNoStorage();
  
  if (produto.quantidade < 3) {
    mostrarToast(`⚠️ ${produto.nome} - Estoque baixo! (${produto.quantidade} un restantes)`, 'error');
  } else {
    mostrarSucesso(`✅ Retirados ${qtdRetirada} un de ${produto.nome} (${produto.quantidade} restantes)`);
  }
  
  renderizarProdutos();
}

// Editar quantidade
function editarQuantidade(id) {
  const produto = produtos.find(p => p.id === id);
  if (!produto) {
    mostrarErro('Erro', 'Produto não encontrado');
    return;
  }

  const novaQuantidade = prompt(`Editar quantidade de "${produto.nome}"\nQuantidade atual: ${produto.quantidade}`, produto.quantidade);
  
  if (novaQuantidade === null) return; // Cancelou
  
  const numQtde = parseInt(novaQuantidade);
  
  if (isNaN(numQtde) || numQtde < 0) {
    mostrarErro('Erro', 'Digite um número válido!');
    return;
  }

  produto.quantidade = numQtde;
  salvarNoStorage();
  mostrarSucesso(`✅ Quantidade atualizada para ${numQtde} un`);
  renderizarProdutos();
}

// Renderizar um único produto (card)
function renderizarProdutoCard(produto, index = 0) {
  const li = document.createElement("li");
  li.className = "produto-card";
  li.id = `produto-${produto.id}`;
  const totalProduto = produto.preco * produto.quantidade;
  
  if (produto.quantidade < 3) {
    li.style.borderColor = '#fca5a5';
    li.style.backgroundColor = '#fef2f2';
  }
  
  li.style.animationDelay = `${index * 0.05}s`;
  
  li.innerHTML = `
    <div class="produto-info">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px;">
        <div class="produto-nome">${escapeHtml(produto.nome)}</div>
        ${produto.quantidade < 3 ? '<span style="background: linear-gradient(135deg, #ef4444, #dc2626); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75em; font-weight: 700; white-space: nowrap;">⚠️ BAIXO</span>' : ''}
      </div>
      <div class="produto-details">
        <div class="detail-item">
          <div class="detail-label">Preço Unit.</div>
          <div class="detail-value">€${(+produto.preco).toFixed(2)}</div>
        </div>
        <div class="detail-item ${produto.quantidade < 3 ? 'baixo-estoque' : ''}">
          <div class="detail-label">Quantidade</div>
          <div class="detail-value" style="cursor: pointer; transition: all 0.3s ease;" onclick="editarQuantidade('${produto.id}')" title="Clique para editar">${produto.quantidade}</div>
        </div>
      </div>
      <div class="produto-total">
        <div class="produto-total-label">Valor Total</div>
        <div class="produto-total-value">€${totalProduto.toFixed(2)}</div>
      </div>
      <div class="produto-data">📅 ${produto.dataCriacao}</div>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <button class="btn-baixa" onclick="darBaixa('${produto.id}')">📉 Dar Baixa</button>
      <button class="btn-remover" onclick="remover('${produto.id}')">🗑️ Remover</button>
    </div>
  `;
  return li;
}

// Atualizar contador e total sem renderizar toda a lista
function atualizarDadosGlobais() {
  let somaTotal = 0;
  for (let i = 0; i < produtos.length; i++) {
    somaTotal += produtos[i].preco * produtos[i].quantidade;
  }
  document.getElementById("totalValor").textContent = somaTotal.toFixed(2);
  document.getElementById("contador").textContent = produtos.length;
  document.getElementById("totalSection").style.display = 'block';
}

// Filtrar produtos pela pesquisa
function filtrarProdutos() {
  const termo = document.getElementById("pesquisa").value.toLowerCase();
  const cards = document.querySelectorAll('.produto-card');
  let visiveisCount = 0;

  if (termo === '') {
    for (let i = 0; i < cards.length; i++) {
      cards[i].style.display = '';
    }
    visiveisCount = cards.length;
  } else {
    for (let i = 0; i < cards.length; i++) {
      const nome = cards[i].querySelector('.produto-nome').textContent.toLowerCase();
      if (nome.includes(termo)) {
        cards[i].style.display = '';
        visiveisCount++;
      } else {
        cards[i].style.display = 'none';
      }
    }
  }

  const lista = document.getElementById("lista");
  let nenhumResultado = lista.querySelector('.nenhum-resultado');
  
  if (visiveisCount === 0 && termo !== '') {
    if (!nenhumResultado) {
      const div = document.createElement('div');
      div.className = 'nenhum-resultado vazio';
      div.textContent = `❌ Nenhum produto encontrado para "${termo}"`;
      lista.appendChild(div);
    }
  } else {
    if (nenhumResultado) nenhumResultado.remove();
  }
}

// Renderizar lista de produtos
function renderizarProdutos() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if (produtos.length === 0) {
    lista.innerHTML = `
      <div class="vazio">
        📦 Nenhum produto no inventário<br><small style="opacity: 0.7; font-size: 0.85em;">Comece adicionando um novo produto acima</small>
      </div>
    `;
    document.getElementById("totalSection").style.display = 'none';
    return;
  }

  const fragment = document.createDocumentFragment();
  for (let i = 0; i < produtos.length; i++) {
    fragment.appendChild(renderizarProdutoCard(produtos[i], i));
  }
  lista.appendChild(fragment);
  atualizarDadosGlobais();
}

// Escape HTML para segurança
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Inicializar ao carregar a página
document.addEventListener('DOMContentLoaded', () => {
  console.log('🚀 Aplicação iniciada (modo offline)');
  carregarDoStorage();
  renderizarProdutos();
  document.getElementById("nome").focus();
});
